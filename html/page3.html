<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đăng kí</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>
    <div class="container">
        <form id="frmLogin">
            <h3>Đăng kí tài khoảng</h3>

            <div class="form-group">
                <label class="label" for="txtUsername">Tên đăng kí: </label>
                <input class="form-control" type="text" id="txtUsername" name="txtUsername" required>
            </div>
            <div class="form-group">
                <label class="label" for="txtIDCard">Số CMND/CCCD:</label>
                <input class="form-control" type="text" id="txtIDCard" name="txtIDCard">
            </div>
             <div class="form-group">
                <label class="label" for="sltClass">Lớp:</label>
                <select class="form-control" id="sltClass" name="sltClass">
                    <option value="DA24TTA">DA24TTA</option>
                    <option value="DA24TTB">DA24TTB</option>
                    <option value="DA24TTC">DA24TTC</option>
                    <option value="DA25TTD">DA25TTD</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label" for="txtPassword">Mật khẩu: </label>
                <input class="form-control" type="password" id="txtPassword" name="txtPassword" required>
            </div>

    
            <div class="form-group">
                <label class="label" for="txtConfirmPassword">Nhập lại mật khẩu: </label>
                <input class="form-control" type="password" id="txtConfirmPassword" name="txtConfirmPassword" required>
            </div>

            <div class="form-group">
                <label class="label" for="txtBirthday">Ngày sinh: </label>
                <input class="form-control" type="date" id="txtBirthday" name="txtBirthday" required>
            </div>

            <div class="form-group">
                <label class="label">Giới tính: </label>
                <input type="radio" name="gender" value="Nam" required> Nam
                <input type="radio" name="gender" value="Nữ"> Nữ
                <input type="radio" name="gender" value="Khác"> Khác
            </div>
            <div class="form-group">
                <label class="label" for="txtPhone">Số điện thoại: </label>
                <input class="form-control" type="tel" id="txtPhone" name="txtPhone" required>
            </div>
            <div class="form-group">
              <label class="label" for="txtEmail">Email: </label>
              <input class="form-control" type="email" id="txtEmail" name="txtEmail" required>
            </div>
            <input type="submit" id="sbLogin" name="sbLogin" value="Đăng kí">
        </form>
    </div>
</body>
</html>
