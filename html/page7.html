<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Thiết kế form</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/style7.css">
</head>
<body>
    <div class="container">
        <!-- Khung chứa danh sách sản phẩm -->
        <div class="product-list" id="product-list">
        </div>
    </div>

    <script>
        // Tạo thẻ div khung chứa 1 sản phẩm - product item
        const productItem = document.createElement("div");
        productItem.setAttribute("class", "product-item");

        // Tạo khung số 1 - chứa ảnh - product image
        const productImage = document.createElement("div");
        productImage.setAttribute("class", "product-image");

        // Thêm ảnh vào khung chứa
        const myImage = document.createElement("img");
        myImage.setAttribute("src", "../assets/images/hoahuongduong.jpg");
        myImage.setAttribute("alt", "Hạt giống hoa Hướng dương");
        
        // Gắn hình vào khung chứa product image
        productImage.appendChild(myImage);

        // Tạo khung số 2 - chứa thông tin sản phẩm - product info
        const productInfo = document.createElement("div");
        productInfo.setAttribute("class", "product-info");

        // Thêm đối tượng p, a cho khung chứa product info
        const productName = document.createElement("p");
        const productNameText = document.createTextNode("Hạt giống hoa hướng dương");
        productName.appendChild(productNameText);
        
        // Gắn vào khung chứa
        productInfo.appendChild(productName);

        // Thêm đối tượng p, a cho khung chứa product info
        const productPrice = document.createElement("p");
        const productPriceText = document.createTextNode("250000/túi");
        productPrice.appendChild(productPriceText);

        // Gắn vào khung chứa
        productInfo.appendChild(productPrice);


        // thêm thẻ link
        const productLink = document.createElement("a");
        productLink.setAttribute("href", "#");
        const productLinkText = document.createTextNode("Đặt mua");
        productLink.appendChild(productLinkText);
        productInfo.appendChild(productLink);
       
        // Gắn 2 khung chứa image và info vào product item
        productItem.appendChild(productImage);
        productItem.appendChild(productInfo);

        // Gắn product item vào product list
        document.getElementById("product-list").appendChild(productItem);
    </script>
</body>
</html>
